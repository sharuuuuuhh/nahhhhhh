<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>KALLA KALI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at bottom right, #ffd166 0%, #0f1724 70%);
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  position:relative;
}

/* =========================
   FLOATING PHOTOS
========================= */

.floating-images{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  overflow:hidden;
  z-index:1;
}

.float{
  position:absolute;
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:25px;
  opacity:0.25;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  animation:floatAnimation ease-in-out infinite;
}

/* Individual image positions */

.img1{
  top:5%;
  left:5%;
  animation-duration:15s;
}

.img2{
  top:15%;
  right:5%;
  animation-duration:18s;
}

.img3{
  bottom:10%;
  left:10%;
  animation-duration:20s;
}

.img4{
  bottom:8%;
  right:10%;
  animation-duration:17s;
}

.img5{
  top:40%;
  left:40%;
  animation-duration:22s;
}

/* Floating movement */

@keyframes floatAnimation{

  0%{
    transform:translateY(0px) translateX(0px) rotate(0deg);
  }

  25%{
    transform:translateY(-25px) translateX(15px) rotate(3deg);
  }

  50%{
    transform:translateY(20px) translateX(-20px) rotate(-3deg);
  }

  75%{
    transform:translateY(-10px) translateX(10px) rotate(2deg);
  }

  100%{
    transform:translateY(0px) translateX(0px) rotate(0deg);
  }
}

/* =========================
   MAIN CONTENT
========================= */

.container{
  position:relative;
  z-index:2;
  text-align:center;
  padding:20px;
}

h1{
  font-size:55px;
  font-weight:800;
  margin-bottom:25px;
  text-shadow:0 5px 15px rgba(0,0,0,0.4);
}

p{
  font-size:22px;
  margin-bottom:30px;
  color:#f1f1f1;
}

/* Buttons */

.buttons{
  position:relative;
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

button{
  padding:15px 35px;
  border:none;
  border-radius:14px;
  font-size:22px;
  cursor:pointer;
  transition:0.3s ease;
  font-weight:600;
}

.yes{
  background:#ff6b81;
  color:white;
  box-shadow:0 5px 15px rgba(255,107,129,0.5);
}

.yes:hover{
  transform:scale(1.08);
  background:#ff4f6d;
}

.no{
  background:rgba(255,255,255,0.12);
  color:white;
  position:absolute;
  left:180px;
  backdrop-filter:blur(5px);
}

footer{
  margin-top:50px;
  font-size:18px;
  opacity:0.8;
}

</style>
</head>

<body>

<!-- FLOATING PHOTOS -->

<div class="floating-images">

  <!-- Replace image names with your own -->

  <img src="img1.jpg" class="float img1">
  <img src="img2.jpg" class="float img2">
  <img src="img3.jpg" class="float img3">
  <img src="img4.jpg" class="float img4">
  <img src="img5.jpg" class="float img5">

</div>

<!-- MAIN CONTENT -->

<div class="container">

  <h1>Ayy Ntha Nee No Koduthe . Kalla Kali aahne ithe</h1>

  <p>Onnude Aloikke....</p>

  <div class="buttons">

    <button class="yes"
      onclick="window.location.href='yes.html'">
      YES
    </button>

    <button class="no" id="noBtn">
      NO
    </button>

  </div>

  <footer>
    <p>© SHARUUUUUHH</p>
  </footer>

</div>

<script>

const noBtn = document.getElementById("noBtn");

function randomPosition(){

  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 80);

  noBtn.style.left = `${x}px`;
  noBtn.style.top = `${y}px`;
}

/* Move NO button when mouse comes near */

noBtn.addEventListener("mouseover", randomPosition);

/* If clicked */

noBtn.addEventListener("click", () => {
  window.location.href='think-slow.html';
});

</script>

</body>
</html>
